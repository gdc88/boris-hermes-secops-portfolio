<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Hermes SecOps Copilot architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08090a"/><stop offset="1" stop-color="#111226"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#191a1b"/><stop offset="1" stop-color="#0f1011"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#7170ff"/></marker>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1030" cy="80" r="240" fill="#7170ff" opacity="0.13"/>
  <circle cx="160" cy="520" r="220" fill="#10b981" opacity="0.08"/>
  <text x="70" y="82" fill="#f7f8f8" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="600">Hermes SecOps Copilot</text>
  <text x="70" y="122" fill="#8a8f98" font-family="Inter,Arial,sans-serif" font-size="20">Portfolio-safe AI automation architecture for IT, cloud security operations, and agentic workflows</text>
  <g filter="url(#shadow)">
    <rect x="70" y="190" width="210" height="130" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="315" y="190" width="210" height="130" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="560" y="190" width="210" height="130" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="805" y="190" width="210" height="130" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="1050" y="190" width="160" height="130" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>
  <g font-family="Inter,Arial,sans-serif">
    <text x="95" y="232" fill="#7170ff" font-size="14" font-weight="600">INPUT</text><text x="95" y="262" fill="#f7f8f8" font-size="22" font-weight="600">Telegram</text><text x="95" y="292" fill="#8a8f98" font-size="15">Prompts, alerts, approvals</text>
    <text x="340" y="232" fill="#7170ff" font-size="14" font-weight="600">RUNTIME</text><text x="340" y="262" fill="#f7f8f8" font-size="22" font-weight="600">Hermes Agent</text><text x="340" y="292" fill="#8a8f98" font-size="15">Subtasks, tools, reports</text>
    <text x="585" y="232" fill="#7170ff" font-size="14" font-weight="600">MEMORY</text><text x="585" y="262" fill="#f7f8f8" font-size="22" font-weight="600">Local KB</text><text x="585" y="292" fill="#8a8f98" font-size="15">Runbooks, decisions, evidence</text>
    <text x="830" y="232" fill="#7170ff" font-size="14" font-weight="600">MODULES</text><text x="830" y="262" fill="#f7f8f8" font-size="22" font-weight="600">M365 / Azure</text><text x="830" y="292" fill="#8a8f98" font-size="15">Security readiness checks</text>
    <text x="1075" y="232" fill="#7170ff" font-size="14" font-weight="600">OUTPUT</text><text x="1075" y="262" fill="#f7f8f8" font-size="22" font-weight="600">Reports</text><text x="1075" y="292" fill="#8a8f98" font-size="15">Risks + next actions</text>
  </g>
  <g stroke="#7170ff" stroke-width="3" opacity="0.7" fill="none" marker-end="url(#arrow)"><path d="M280 255 H315"/><path d="M525 255 H560"/><path d="M770 255 H805"/><path d="M1015 255 H1050"/></g>
  <rect x="180" y="400" width="920" height="120" rx="18" fill="#0f1011" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="220" y="445" fill="#f7f8f8" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600">Human approval gate</text>
  <text x="220" y="480" fill="#8a8f98" font-family="Inter,Arial,sans-serif" font-size="17">No tenant changes, credential use, outreach, or irreversible remediation without explicit authorization.</text>
  <text x="220" y="555" fill="#62666d" font-family="JetBrains Mono,monospace" font-size="14">portfolio-safe visual: no private data, tokens, chats, tenant exports, or browser sessions</text>
</svg>
